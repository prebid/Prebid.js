name: Build & Deploy Prebid.js

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Prebid.js
        run: |
          npx gulp build --modules=consentManagementGpp,consentManagementTcf,consentManagementUsp,storageControl,tcfControl,gppControl_usnat,gppControl_usstates,allowActivities,bidResponseFilter,bidViewability,currency,priceFloors,debugging,geolocationRtdProvider,multibid,nativeRendering,prebidServerBidAdapter,previousAuctionInfo,s2sTesting,schain,rules,timeoutRtdProvider,videoModule,validationFpdModule,userId,sharedIdSystem,id5IdSystem,amxIdSystem,unifiedIdSystem,criteoIdSystem,adfBidAdapter,tpcBidAdapter,magniteBidAdapter,pubmaticBidAdapter,ixBidAdapter

      - name: List build output
        run: find build/ -name "prebid.js" | head -20

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        run: |
          # Upload the latest build (short-lived cache)
          aws s3 cp build/dist/prebid.js \
            s3://${{ secrets.S3_BUCKET }}/prod/prebid.js \
            --cache-control "public, max-age=3600, s-maxage=86400" \
            --content-type "application/javascript"

          # Upload a versioned copy (long-lived cache)
          VERSION=$(node -p "require('./package.json').version")
          aws s3 cp build/dist/prebid.js \
            s3://${{ secrets.S3_BUCKET }}/prod/prebid-${VERSION}.js \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/javascript"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/prod/prebid.js"

