name: Compile dependencies.json for PR assignment checks
on:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
  pull-requests: write
  issues: write
jobs:
  generate_deps:
    name: Generate dependencies.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/head
      - name: Install dependencies
        uses: ./.github/actions/npm-ci
      - name: Build
        run: |
          npx gulp build
      - name: Upload dependencies.json
        uses: actions/upload-artifact@v7
        with:
          name: dependencies.json
          path: ./build/dist/dependencies.json
      - name: Generate PR info
        run: |
          echo '{ "prNo": ${{ github.event.pull_request.number }} }' >> ${{ runner.temp}}/prInfo.json
      - name: Upload PR info
        uses: actions/upload-artifact@v7
        with:
          name: prInfo
          path: ${{ runner.temp}}/prInfo.json

      - name: Auto-label core PRs
        uses: actions/github-script@v8
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });

            const coreModuleNames = new Set([
              'bidResponseFilter',
              'dataControllerModule',
              'debugging',
              'enrichmentLiftMeasurement',
              'fpdModule',
              'multibid',
              'prebidServerBidAdapter',
              'previousAuctionInfo',
              'consentManagementGpp',
              'consentManagementTcf',
              'consentManagementUsp',
              'storageControl',
              'dsaControl',
              'tcfControl',
              'gppControl_usnat',
              'gppControl_usstates'
            ]);

            const touchesCore = files.some(({filename}) => {
              if (filename.startsWith('src/')) return true;
              const moduleName = filename.match(/^modules\/([^\/]+)(\.(\w+)|\/)/)?.[1];
              return moduleName != null && coreModuleNames.has(moduleName);
            });

            if (!touchesCore) {
              core.info('Skipping "core" label: no matching files changed');
              return;
            }

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ['core']
              });
              core.info('Applied "core" label');
            } catch (e) {
              if (e?.status === 403) {
                core.warning('Skipping "core" label: token cannot write labels (read-only token)');
                return;
              }
              throw e;
            }
